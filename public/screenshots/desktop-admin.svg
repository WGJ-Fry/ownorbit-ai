  <text x="492" y="526" fill="#475569" font-family="Arial, sans-serif" font-size="14">PWA install path keeps the pairing token through iOS add-to-home-screen.</text>
  <rect x="748" y="384" width="412" height="242" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="780" y="426" fill="#0f172a" font-family="Arial, sans-serif" font-size="20" font-weight="800">Security and backups</text>
  <rect x="780" y="456" width="328" height="42" rx="12" fill="#ecfdf5"/>
  <text x="804" y="483" fill="#166534" font-family="Arial, sans-serif" font-size="15" font-weight="700">Dangerous local actions require confirmation</text>
  <rect x="780" y="514" width="328" height="42" rx="12" fill="#eff6ff"/>
  <text x="804" y="541" fill="#1d4ed8" font-family="Arial, sans-serif" font-size="15" font-weight="700">Backups, restore preview, and cancel restore</text>
  <rect x="780" y="572" width="328" height="42" rx="12" fill="#f1f5f9"/>
  <text x="804" y="599" fill="#334155" font-family="Arial, sans-serif" font-size="15" font-weight="700">Redacted diagnostics and audit logs</text>
  <rect x="336" y="660" width="824" height="52" rx="16" fill="#0f172a"/>
  <text x="366" y="693" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="800">Local-first personal AI assistant for desktop and phone</text>
