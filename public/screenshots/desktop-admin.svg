  <text x="932" y="238" fill="#92400e" font-family="Arial, sans-serif" font-size="17" font-weight="800">AI providers</text>
  <text x="932" y="270" fill="#b45309" font-family="Arial, sans-serif" font-size="14">Gemini, OpenAI, OpenRouter</text>
  <text x="932" y="305" fill="#92400e" font-family="Arial, sans-serif" font-size="32" font-weight="800">Ready</text>
  <rect x="336" y="384" width="374" height="242" rx="20" fill="url(#panel)"/>
  <text x="364" y="426" fill="#0f172a" font-family="Arial, sans-serif" font-size="20" font-weight="800">Mobile binding</text>
