  <text x="104" y="324" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">AI Providers</text>
  <text x="104" y="378" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Backups</text>
  <text x="104" y="432" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Security</text>
  <text x="104" y="486" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Diagnostics</text>
  <text x="336" y="118" fill="#0f172a" font-family="Arial, sans-serif" font-size="34" font-weight="800">Desktop local core</text>
  <text x="336" y="153" fill="#64748b" font-family="Arial, sans-serif" font-size="17">Connect AI, manage devices, keep data local, and serve the mobile PWA.</text>
