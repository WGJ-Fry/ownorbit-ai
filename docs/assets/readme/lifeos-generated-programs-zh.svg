<svg width="1280" height="650" viewBox="0 0 1280 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">自动生成解决问题的程序</title>
  <desc id="desc">不是为了炫技，而是根据当前需求做出能处理问题的工具。</desc>
  <rect width="1280" height="650" rx="32" fill="#080F18"/>
  <rect x="34" y="34" width="1212" height="582" rx="30" fill="#0A1420" stroke="#223449"/>
  <text x="64" y="92" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="45" font-weight="900">自动生成解决问题的程序</text>
  <text x="64" y="132" fill="#94A3B8" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21">不是为了炫技，而是根据当前需求做出能处理问题的工具。</text>
  <g transform="translate(74 188)">
    <rect width="320" height="344" rx="28" fill="#111827" stroke="#334155"/>
