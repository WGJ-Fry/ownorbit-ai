    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Create tools for the current problem</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">budgeting, planning, lookup, forms</text>
  </g>

  <g transform="translate(78 650)">
