    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">LAN, Tailscale/VPN</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Cloudflare Tunnel, HTTPS</text>
  </g>

  <g transform="translate(892 650)">
