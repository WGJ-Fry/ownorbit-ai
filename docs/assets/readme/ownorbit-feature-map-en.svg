    <text x="28" y="42" fill="#FDA4AF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">Safety Layer</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Admin auth, CSRF</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">URL allowlist, risky action confirm</text>
  </g>
