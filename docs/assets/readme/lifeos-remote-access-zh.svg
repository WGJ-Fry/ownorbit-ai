    <text x="32" y="58" fill="#FDE68A" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="850">Cloudflare Tunnel</text>
    <text x="32" y="104" fill="#FEF3C7" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18">HTTPS 公网入口</text>
    <text x="32" y="136" fill="#FEF3C7" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18">生成命令和环境配置</text>
