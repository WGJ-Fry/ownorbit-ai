<svg width="1280" height="620" viewBox="0 0 1280 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LifeOS 异地连接</title>
  <desc id="desc">LifeOS 手机端异地连接路径：局域网、Tailscale/VPN、Cloudflare Tunnel 和安全自检。</desc>
  <rect width="1280" height="620" rx="32" fill="#071019"/>
  <text x="64" y="76" fill="#F8FAFC" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="42" font-weight="850">手机不在同一个局域网，也能连回电脑端</text>
  <text x="64" y="116" fill="#94A3B8" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="21">LifeOS 的 AI 核心仍在你的电脑上，手机通过安全入口连接回来。</text>
