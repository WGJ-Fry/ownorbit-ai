<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OwnOrbit AI 首屏图</title>
  <desc id="desc">OwnOrbit AI 本地优先个人 AI 管家，包含记忆提醒、自动生成解决问题程序和手机异地连接。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.58" stop-color="#0A1724"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13293D"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1212" height="652" rx="30" fill="#08111C" stroke="#223449"/>

  <g>
    <rect x="72" y="72" width="408" height="38" rx="19" fill="#102033" stroke="#2DD4BF"/>
    <text x="89" y="97" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Private AI core + mobile companion</text>
  </g>
  <text x="72" y="164" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="70" font-weight="900">OwnOrbit AI</text>
  <text x="72" y="218" fill="#A7F3D0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850">本地优先的个人 AI 管家</text>
  <text x="72" y="274" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23">电脑端是私有 AI 核心，手机端是随身入口。</text>
  <text x="72" y="308" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23">从笔记、记忆和真实需求里发现下一步行动。</text>
  <rect x="72" y="350" width="568" height="88" rx="22" fill="#12263A" stroke="#2DD4BF" stroke-width="2"/>
  <text x="104" y="405" fill="#FFFFFF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="900">"我是不是忘了什么？"</text>

  <g transform="translate(72 486)">
    <rect width="338" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#67E8F9"/>
    <text x="28" y="42" fill="#67E8F9" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">记忆提醒</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">发现截止日期、承诺</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">续期和遗漏任务</text>
  </g>

  <g transform="translate(440 486)">
    <rect width="376" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#FDE68A"/>
    <text x="28" y="42" fill="#FDE68A" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">解决问题</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">需要记账、规划、整理</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">计算时生成可运行程序</text>
  </g>

  <g transform="translate(846 486)">
    <rect width="338" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#93C5FD"/>
    <text x="28" y="42" fill="#93C5FD" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">异地连接</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">通过 LAN、VPN</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">或 Tunnel 连接手机</text>
  </g>
  <g transform="translate(794 86)">
    <rect width="332" height="364" rx="32" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
    <rect x="30" y="30" width="272" height="66" rx="18" fill="#020617" stroke="#26384F"/>
    <text x="54" y="70" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="850">电脑端核心</text>
    <rect x="30" y="120" width="128" height="92" rx="18" fill="#134E4A" stroke="#14B8A6"/>
    <text x="52" y="157" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="850">记忆</text>
    <text x="52" y="184" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">提醒</text>
    <rect x="174" y="120" width="128" height="92" rx="18" fill="#422006" stroke="#F59E0B"/>
    <text x="196" y="157" fill="#FEF3C7" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="850">生成</text>
    <text x="196" y="184" fill="#FEF3C7" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">程序</text>
    <rect x="30" y="236" width="272" height="86" rx="18" fill="#172554" stroke="#2563EB"/>
    <text x="54" y="270" fill="#DBEAFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="850">手机端随身入口</text>
    <text x="54" y="298" fill="#BFDBFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">扫码绑定、异地连接、离线队列</text>
  </g>
</svg>
