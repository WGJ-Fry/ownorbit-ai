    <rect width="7" height="132" rx="4" fill="#67E8F9"/>
    <text x="27" y="46" fill="#67E8F9" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="800">Memory</text>
    <text x="27" y="82" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17">Recall what matters</text>
    <text x="27" y="108" fill="#94A3B8" font-family="Inter, Arial, Helvetica, sans-serif" font-size="15">Local Markdown + SQLite</text>
  </g>
  <g transform="translate(310 354)">
    <rect width="238" height="132" rx="18" fill="#0F1D2E" stroke="#2A4057"/>
    <rect width="7" height="132" rx="4" fill="#FDE68A"/>
    <text x="27" y="46" fill="#FDE68A" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="800">Generated tools</text>
    <text x="27" y="82" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17">Solve the current problem</text>
    <text x="27" y="108" fill="#94A3B8" font-family="Inter, Arial, Helvetica, sans-serif" font-size="15">Runnable programs</text>
  </g>
  <g transform="translate(570 354)">
    <rect width="214" height="132" rx="18" fill="#0F1D2E" stroke="#2A4057"/>
    <rect width="7" height="132" rx="4" fill="#93C5FD"/>
