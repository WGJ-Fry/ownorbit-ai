    <text x="48" y="308" fill="#94A3B8" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14">Offline queue ready</text>
    <rect x="28" y="344" width="254" height="76" rx="18" fill="#172554" stroke="#3B82F6"/>
    <text x="48" y="376" fill="#DBEAFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Your AI, on your computer</text>
    <text x="48" y="400" fill="#BFDBFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="14">Available from your phone</text>
