<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OwnOrbit AI social preview</title>
  <desc id="desc">Open-source, local-first personal AI assistant with private memory, generated tools, and a remote mobile companion.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0A1826"/>
      <stop offset="1" stop-color="#102338"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153047"/>
      <stop offset="1" stop-color="#0A1220"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#background)"/>
  <rect x="34" y="34" width="1212" height="572" rx="28" fill="#08131F" stroke="#263A50" stroke-width="2"/>

  <rect x="74" y="70" width="377" height="40" rx="20" fill="#102A35" stroke="#2DD4BF"/>
  <text x="94" y="96" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="800">OPEN-SOURCE + SELF-HOSTED</text>
  <text x="74" y="190" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="82" font-weight="900">OwnOrbit AI</text>
  <text x="74" y="244" fill="#A7F3D0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="800">Local-first personal AI assistant</text>
  <text x="74" y="300" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23">Private desktop core. Everyday mobile companion.</text>

  <g transform="translate(74 354)">
