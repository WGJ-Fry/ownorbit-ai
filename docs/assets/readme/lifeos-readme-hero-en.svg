<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">LifeOS AI hero</title>
  <desc id="desc">LifeOS AI is a local-first personal AI memory assistant for Markdown notes, Ollama, desktop core, and mobile companion.</desc>
  <rect width="1280" height="720" rx="34" fill="#081018"/>
  <rect x="36" y="36" width="1208" height="648" rx="28" fill="#0D1722" stroke="#213244"/>
  <circle cx="104" cy="102" r="14" fill="#67E8F9"/>
  <circle cx="144" cy="102" r="14" fill="#A7F3D0"/>
  <circle cx="184" cy="102" r="14" fill="#FDE68A"/>
  <text x="72" y="182" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800">LifeOS AI</text>
  <text x="72" y="236" fill="#B9F6CA" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">A local-first personal AI that helps you remember what you might forget.</text>
  <text x="72" y="292" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="24">Ask one practical question:</text>
  <rect x="72" y="318" width="526" height="76" rx="20" fill="#12263A" stroke="#2DD4BF"/>
  <text x="100" y="366" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">“What am I forgetting?”</text>
  <g transform="translate(72 438)">
    <rect width="206" height="118" rx="20" fill="#102033" stroke="#334155"/>
    <text x="24" y="42" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Input</text>
    <text x="24" y="76" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20">Plain Markdown</text>
  </g>
  <g transform="translate(300 438)">
    <rect width="206" height="118" rx="20" fill="#102033" stroke="#334155"/>
    <text x="24" y="42" fill="#A7F3D0" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Runtime</text>
    <text x="24" y="76" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20">Ollama + Docker</text>
  </g>
  <g transform="translate(528 438)">
    <rect width="246" height="118" rx="20" fill="#102033" stroke="#334155"/>
    <text x="24" y="42" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">Output</text>
    <text x="24" y="76" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="20">Deadlines and promises</text>
  </g>
  <g transform="translate(842 116)">
    <rect width="318" height="472" rx="34" fill="#020617" stroke="#334155" stroke-width="2"/>
    <rect x="22" y="24" width="274" height="424" rx="24" fill="#0F172A"/>
    <text x="44" y="76" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="17">Local Markdown vault</text>
    <rect x="44" y="98" width="230" height="78" rx="16" fill="#172554" stroke="#2563EB"/>
    <text x="64" y="130" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="16">Passport expires in 47 days</text>
    <text x="64" y="156" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="16">Proposal due tomorrow</text>
    <rect x="44" y="206" width="230" height="78" rx="16" fill="#134E4A" stroke="#14B8A6"/>
    <text x="64" y="238" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="16">LifeOS answer</text>
    <text x="64" y="264" fill="#CCFBF1" font-family="Inter, Arial, sans-serif" font-size="16">You may be forgetting...</text>
    <rect x="44" y="314" width="230" height="86" rx="16" fill="#422006" stroke="#F59E0B"/>
    <text x="64" y="347" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="16">Private desktop core</text>
    <text x="64" y="374" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="16">Mobile companion ready</text>
  </g>
</svg>
