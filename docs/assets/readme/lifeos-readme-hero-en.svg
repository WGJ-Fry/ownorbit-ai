<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OwnOrbit AI hero</title>
  <desc id="desc">OwnOrbit AI local-first personal AI assistant with memory recall, generated problem-solving programs, and remote mobile access.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="0.58" stop-color="#0A1724"/>
      <stop offset="1" stop-color="#102033"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13293D"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" rx="34" fill="url(#bg)"/>
  <rect x="34" y="34" width="1212" height="652" rx="30" fill="#08111C" stroke="#223449"/>

  <g>
    <rect x="72" y="72" width="408" height="38" rx="19" fill="#102033" stroke="#2DD4BF"/>
    <text x="89" y="97" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16" font-weight="800">Private AI core + mobile companion</text>
  </g>
  <text x="72" y="164" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="70" font-weight="900">OwnOrbit AI</text>
  <text x="72" y="218" fill="#A7F3D0" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="850">Local-first personal AI assistant</text>
  <text x="72" y="274" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23">Your computer runs the private core.</text>
  <text x="72" y="308" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="23">Your phone becomes the everyday assistant.</text>
  <rect x="72" y="350" width="568" height="88" rx="22" fill="#12263A" stroke="#2DD4BF" stroke-width="2"/>
  <text x="104" y="405" fill="#FFFFFF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="34" font-weight="900">"What am I forgetting?"</text>

  <g transform="translate(72 486)">
    <rect width="338" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#67E8F9"/>
    <text x="28" y="42" fill="#67E8F9" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">Memory recall</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Find deadlines, promises</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">renewals, and loose ends</text>
  </g>

  <g transform="translate(440 486)">
    <rect width="376" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#FDE68A"/>
    <text x="28" y="42" fill="#FDE68A" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">Problem-solving tools</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Generate runnable programs</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">for real needs</text>
  </g>

  <g transform="translate(846 486)">
    <rect width="338" height="136" rx="22" fill="#0F172A" stroke="#26384F"/>
    <rect x="0" y="0" width="7" height="136" rx="4" fill="#93C5FD"/>
    <text x="28" y="42" fill="#93C5FD" font-family="Inter, Arial, Helvetica, sans-serif" font-size="21" font-weight="850">Remote companion</text>
    <text x="28" y="78" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">Connect through LAN</text><text x="28" y="106" fill="#CBD5E1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">VPN, or Tunnel</text>
  </g>
  <g transform="translate(794 86)">
    <rect width="332" height="364" rx="32" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
    <rect x="30" y="30" width="272" height="66" rx="18" fill="#020617" stroke="#26384F"/>
    <text x="54" y="70" fill="#F8FAFC" font-family="Inter, Arial, Helvetica, sans-serif" font-size="20" font-weight="850">Desktop Core</text>
    <rect x="30" y="120" width="128" height="92" rx="18" fill="#134E4A" stroke="#14B8A6"/>
    <text x="52" y="157" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="850">Memory</text>
    <text x="52" y="184" fill="#CCFBF1" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">Recall</text>
    <rect x="174" y="120" width="128" height="92" rx="18" fill="#422006" stroke="#F59E0B"/>
    <text x="196" y="157" fill="#FEF3C7" font-family="Inter, Arial, Helvetica, sans-serif" font-size="17" font-weight="850">Generated</text>
    <text x="196" y="184" fill="#FEF3C7" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">Tools</text>
    <rect x="30" y="236" width="272" height="86" rx="18" fill="#172554" stroke="#2563EB"/>
    <text x="54" y="270" fill="#DBEAFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18" font-weight="850">Mobile companion</text>
    <text x="54" y="298" fill="#BFDBFE" font-family="Inter, Arial, Helvetica, sans-serif" font-size="16">Pairing, remote access, offline queue</text>
  </g>
</svg>
