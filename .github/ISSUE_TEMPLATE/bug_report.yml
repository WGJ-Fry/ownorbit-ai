name: Bug report
description: Report a OwnOrbit AI bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary / 问题摘要
      description: What happened? / 发生了什么？
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      options:
        - macOS
        - Windows
        - Linux
        - Mobile PWA
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / 版本
      placeholder: "0.1.5-alpha.0 / v0.1.5-alpha"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / 复现步骤
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / 实际结果
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics / 诊断信息
      description: Attach a redacted diagnostic bundle if possible. Do not paste API keys, passwords, tokens, certificates, or private keys. / 可以附加脱敏诊断包；不要粘贴 API Key、密码、Token、证书或私钥。
    validations:
      required: false
