name: Desktop Package Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64 libgbm1 libxshmfence1 xvfb

      - name: Install Electron binary
        run: npm run electron:install

      - name: Resolve Windows Node binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "LIFEOS_NODE_BINARY=$((Get-Command node).Source)" >> $env:GITHUB_ENV

      - name: Build and verify desktop package
        if: runner.os != 'Linux'
        env:
          NODE_OPTIONS: --experimental-sqlite
          LIFEOS_RELEASE_SMOKE_FAST: "1"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: npm run desktop:release:smoke

      - name: Build and verify desktop package (Linux)
        if: runner.os == 'Linux'
        env:
          NODE_OPTIONS: --experimental-sqlite
          LIFEOS_RELEASE_SMOKE_FAST: "1"
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_DISABLE_SANDBOX: "1"
        run: xvfb-run -a npm run desktop:release:smoke

      - name: Upload package and update metadata
        uses: actions/upload-artifact@v4
        with:
          name: lifeos-ai-${{ matrix.platform }}-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/SHA256SUMS
            release/USER-INSTALL.md
            release/INSTALL-unsigned-mac.md
            release/update-feed/latest*.yml
            release/update-feed/release-manifest.json

  publish-draft:
    name: draft-release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: lifeos-ai-*-${{ github.run_number }}

      - name: Assemble release draft assets
        run: node scripts/assemble-release-draft-assets.mjs

      - name: Upload files to GitHub Release draft
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          name: LifeOS AI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-draft/*.dmg
            release-draft/*.zip
            release-draft/*.exe
            release-draft/*.AppImage
            release-draft/SHA256SUMS
            release-draft/USER-INSTALL.md
            release-draft/INSTALL-unsigned-mac.md
            release-draft/latest*.yml
            release-draft/release-manifest.json
