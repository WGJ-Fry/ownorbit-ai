name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        run: npm run electron:install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit and API tests
        env:
          NODE_OPTIONS: --experimental-sqlite
        run: npm test

      - name: E2E tests
        env:
          NODE_OPTIONS: --experimental-sqlite
        run: npm run test:e2e

      - name: Desktop smoke tests
        env:
          NODE_OPTIONS: --experimental-sqlite
          ELECTRON_DISABLE_SANDBOX: "1"
        run: npm run test:desktop

      - name: Remote connection mock smoke
        env:
          NODE_OPTIONS: --experimental-sqlite
        run: npm run remote:mock-smoke

      - name: Unsigned release check
        env:
          NODE_OPTIONS: --experimental-sqlite
          LIFEOS_RELEASE_SKIP_ARTIFACTS: "1"
        run: npm run release:check:unsigned
