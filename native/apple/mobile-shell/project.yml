name: LifeOSMobile
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "1"
targets:
  LifeOSMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: Config
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.lifeos.mobile
        PRODUCT_NAME: LifeOSMobile
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Config/LifeOSMobile.entitlements
        LIFEOS_CLOUDKIT_CONTAINER_ID: iCloud.ai.lifeos.desktop
        LIFEOS_CLOUDKIT_ENVIRONMENT: Development
        LIFEOS_APS_ENVIRONMENT: development
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: OwnOrbit Mobile
        CFBundleShortVersionString: "0.1.5"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
        NSLocalNetworkUsageDescription: OwnOrbit connects to your own computer on the local network.
        LifeOSCloudKitContainerIdentifier: $(LIFEOS_CLOUDKIT_CONTAINER_ID)
        LifeOSCloudKitBackgroundRefreshIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER).cloudkit-refresh
        BGTaskSchedulerPermittedIdentifiers:
          - $(PRODUCT_BUNDLE_IDENTIFIER).cloudkit-refresh
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLName: ai.lifeos.mobile.entry
            CFBundleURLSchemes:
              - lifeos
  LifeOSMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: LifeOSMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.lifeos.mobile.tests
        CODE_SIGNING_ALLOWED: NO
schemes:
  LifeOSMobile:
    build:
      targets:
        LifeOSMobile: all
        LifeOSMobileTests: [test]
    test:
      config: Debug
      targets:
        - LifeOSMobileTests
    run:
      config: Debug
